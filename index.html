<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Match Ready</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --red: #ff4444;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 16px;
  }
  .app-title {
    font-family: var(--font-display);
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }
  .week-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* WEEK TABS */
  .week-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .week-tab {
    flex: 1;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .week-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  /* DAY SCROLL */
  .day-scroll-wrap {
    padding: 16px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-scroll-wrap::-webkit-scrollbar { display: none; }
  .day-scroll {
    display: flex;
    gap: 10px;
    min-width: max-content;
    padding-bottom: 16px;
  }
  .day-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 64px;
  }
  .day-pill:hover { border-color: #444; }
  .day-pill.active {
    background: var(--accent);
    border-color: var(--accent);
  }
  .day-pill.rest-day { opacity: 0.4; cursor: default; }
  .day-pill .day-name {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .day-pill.active .day-name { color: #000; }
  .day-pill .day-label {
    font-family: var(--font-display);
    font-size: 15px;
    letter-spacing: 1px;
    color: var(--text);
    text-align: center;
    line-height: 1.1;
  }
  .day-pill.active .day-label { color: #000; }

  /* SESSION HEADER */
  .session-header {
    padding: 20px 20px 12px;
  }
  .session-type {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .session-title {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .session-meta {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .session-meta span { display: flex; align-items: center; gap: 4px; }

  /* WARMUP BANNER */
  .warmup-banner {
    margin: 0 20px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .warmup-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .warmup-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* EXERCISE LIST */
  .exercise-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* EXERCISE CARD */
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .ex-card.done { opacity: 0.45; }
  .ex-card.done .ex-name { text-decoration: line-through; }

  .ex-card-header {
    display: flex;
    align-items: center;
    padding: 14px 14px 14px 14px;
    gap: 12px;
    cursor: pointer;
  }
  .ex-number {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--muted);
    min-width: 26px;
    line-height: 1;
  }
  .ex-info { flex: 1; }
  .ex-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }
  .ex-meta {
    display: flex;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .ex-sets-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }
  .ex-done-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .ex-done-btn.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .ex-done-btn .checkmark { display: none; font-size: 14px; }
  .ex-done-btn.checked .checkmark { display: block; }

  /* EXPAND PANEL */
  .ex-expand {
    display: none;
    border-top: 1px solid var(--border);
  }
  .ex-expand.open { display: block; }

  .ex-gif-wrap {
    width: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    position: relative;
  }
  .ex-gif-wrap img {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    display: block;
  }
  .gif-loading {
    position: absolute;
    font-size: 12px;
    color: var(--muted);
  }
  .gif-fallback {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 24px;
    text-align: center;
  }
  .gif-fallback.show { display: flex; }
  .gif-fallback-icon { font-size: 28px; }
  .gif-fallback-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .gif-search-link {
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 5px 12px;
    margin-top: 4px;
    display: inline-block;
  }

  .ex-details {
    padding: 14px;
  }
  .detail-section {
    margin-bottom: 14px;
  }
  .detail-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .detail-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }
  .form-cues {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .form-cue {
    display: flex;
    gap: 8px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .form-cue::before {
    content: '—';
    color: var(--accent);
    flex-shrink: 0;
  }

  /* REST TIMER */
  .rest-timer-wrap {
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
  }
  .rest-timer-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .timer-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .timer-display {
    font-family: var(--font-display);
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--accent);
    min-width: 80px;
    line-height: 1;
  }
  .timer-display.running { color: var(--text); }
  .timer-display.done-flash { color: var(--accent); }
  .timer-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .timer-btn.start { background: var(--accent); border-color: var(--accent); color: #000; }
  .timer-btn:active { transform: scale(0.97); }
  .timer-presets {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .preset-btn {
    flex: 1;
    padding: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-body);
  }
  .preset-btn:hover { color: var(--text); border-color: #444; }
  .preset-btn.selected { border-color: var(--accent); color: var(--accent); }

  /* REST DAY VIEW */
  .rest-view {
    padding: 40px 20px;
    text-align: center;
  }
  .rest-icon { font-size: 48px; margin-bottom: 16px; }
  .rest-title {
    font-family: var(--font-display);
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .rest-subtitle { font-size: 14px; color: var(--muted); line-height: 1.6; }

  /* TOURNAMENT VIEW */
  .tournament-view {
    padding: 20px;
  }
  .tournament-banner {
    background: var(--accent);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
  }
  .tournament-banner .t-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.5);
    margin-bottom: 4px;
  }
  .tournament-banner .t-title {
    font-family: var(--font-display);
    font-size: 36px;
    letter-spacing: 2px;
    color: #000;
  }

  .matchday-section { margin-bottom: 20px; }
  .matchday-heading {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .matchday-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 8px;
  }
  .matchday-card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .matchday-card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* PROGRESS BAR */
  .session-progress {
    padding: 0 20px 4px;
  }
  .progress-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .progress-text {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
  }

  /* ANKLE NOTE */
  .ankle-note {
    margin: 0 20px 16px;
    background: rgba(255,68,68,0.08);
    border: 1px solid rgba(255,68,68,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #ff8080;
    line-height: 1.5;
  }
</style>
</head>

</div>

<div class="day-scroll-wrap">
  <div class="day-scroll" id="day-scroll"></div>
</div>

<div id="main-content"></div>

let currentWeek = 1;
let currentDayIndex = 0;
let timers = {};

function setWeek(w) {
  currentWeek = w;
  currentDayIndex = 0;
  document.querySelectorAll('.week-tab').forEach((t,i) => t.classList.toggle('active', i+1===w));
  document.getElementById('week-badge').textContent = `Week ${w}`;
  renderDayScroll();
  renderContent();
}

function renderDayScroll() {
  const days = PLAN[currentWeek];
  const scroll = document.getElementById('day-scroll');
  scroll.innerHTML = days.map((d, i) => `
    <div class="day-pill ${i === currentDayIndex ? 'active' : ''} ${(d.isRest||d.isTaper) ? 'rest-day' : ''}"
         onclick="${(d.isRest||d.isTaper) ? '' : `selectDay(${i})`}; ${(d.isRest||d.isTaper) ? `selectDay(${i})` : ''}">
      <span class="day-name">${d.day}</span>
      <span class="day-label">${d.label}</span>
    </div>
  `).join('');
}

function selectDay(i) {
  currentDayIndex = i;
  renderDayScroll();
  renderContent();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderContent() {
  const day = PLAN[currentWeek][currentDayIndex];
  const main = document.getElementById('main-content');

  if (day.isRest || day.isTaper) {
    main.innerHTML = `
      <div class="rest-view">
        <div class="rest-icon">${day.isTaper ? '🧘' : '💤'}</div>
        <div class="rest-title">${day.isTaper ? 'TAPER DAY' : 'REST DAY'}</div>
        <div class="rest-subtitle">${day.isTaper ? day.taperMessage : day.restMessage}</div>
      </div>`;
    return;
  }

  if (day.isTournament) {
    renderTournamentView(main);
    return;
  }

  const total = day.exercises.length;
  const done = day.exercises.filter((_, ei) => localStorage.getItem(`done-w${currentWeek}-d${currentDayIndex}-e${ei}`) === '1').length;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;

  let html = `
    <div class="session-header">
      <div class="session-type">${day.type}</div>
      <div class="session-title">${day.title}</div>
      <div class="session-meta">
        ${day.meta.map(m => `<span>${m}</span>`).join('')}
      </div>
    </div>
    <div class="session-progress">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${done}/${total} exercises done</div>
    </div>
    <div class="warmup-banner">
      <div class="warmup-title">Warmup First</div>
      <div class="warmup-text">${day.warmup}</div>
    </div>`;

  if (day.ankleNote) {
    html += `<div class="ankle-note">⚠ Right ankle: repeated ligament history. Extra care on single-leg work. Never rush ankle exercises. Land softly on jump movements.</div>`;
  }

  if (day.isCardio && day.cardioBlock) {
    const cb = day.cardioBlock;
    html += `
      <div style="margin: 0 20px 16px;">
        <div class="ex-card">
          <div class="ex-card-header" style="cursor:default">
            <div class="ex-info">
              <div class="ex-name" style="color: var(--accent)">${cb.title}</div>
              <div style="font-size:13px;color:var(--muted);margin-top:4px;line-height:1.6">
                <strong style="color:var(--text)">${cb.rounds} rounds</strong> — ${cb.work} → ${cb.rest}
              </div>
              <div style="font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5">${cb.note}</div>
            </div>
          </div>
        </div>
      </div>
      <div style="padding: 0 20px 8px; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted)">Then — Circuit</div>`;
  }

  html += `<div class="exercise-list">`;
  day.exercises.forEach((ex, ei) => {
    const doneKey = `done-w${currentWeek}-d${currentDayIndex}-e${ei}`;
    const isDone = localStorage.getItem(doneKey) === '1';
    html += buildExCard(ex, ei, isDone);
  });
  html += `</div>`;

  main.innerHTML = html;
}

              <button class="preset-btn selected" onclick="setPreset(${ei}, 45, this)">45s</button>
              <button class="preset-btn" onclick="setPreset(${ei}, 60, this)">60s</button>

function handleGifError(ei, name) {
  const wrap = document.getElementById(`gifwrap-${ei}`);
  if (!wrap) return;
  wrap.querySelector('img').style.display = 'none';
  wrap.querySelector('.gif-loading').style.display = 'none';
  const fb = document.getElementById(`fallback-${ei}`);
  fb.classList.add('show');
  const link = document.getElementById(`giflink-${ei}`);
  link.href = `https://www.youtube.com/results?search_query=how+to+do+${name}+exercise+form`;
}

function toggleExpand(ei) {
  const panel = document.getElementById(`expand-${ei}`);
  panel.classList.toggle('open');
}

function toggleDone(e, ei) {
  e.stopPropagation();
  const key = `done-w${currentWeek}-d${currentDayIndex}-e${ei}`;
  const current = localStorage.getItem(key) === '1';
  localStorage.setItem(key, current ? '0' : '1');
  const card = document.getElementById(`excard-${ei}`);
  const btn = document.getElementById(`donebtn-${ei}`);
  card.classList.toggle('done', !current);
  btn.classList.toggle('checked', !current);
  // update progress
  const day = PLAN[currentWeek][currentDayIndex];
  const total = day.exercises.length;
  const done = day.exercises.filter((_, i) => localStorage.getItem(`done-w${currentWeek}-d${currentDayIndex}-e${i}`) === '1').length;
  const pct = Math.round((done/total)*100);
  const fill = document.querySelector('.progress-bar-fill');
  const text = document.querySelector('.progress-text');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = `${done}/${total} exercises done`;
}

// TIMER
const timerState = {};

function setPreset(ei, secs, btn) {
  resetTimer(ei);
  timerState[ei] = timerState[ei] || {};
  timerState[ei].duration = secs;
  const display = document.getElementById(`timer-${ei}`);
  display.textContent = formatTime(secs);
  btn.closest('.timer-presets').querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function formatTime(s) {
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function handleTimer(ei) {
  const state = timerState[ei] || {};
  if (state.running) {
    clearInterval(state.interval);
    state.running = false;
    timerState[ei] = state;
    document.getElementById(`timerbtn-${ei}`).textContent = 'Start';
    document.getElementById(`timer-${ei}`).classList.remove('running');
  } else {
    if (!state.duration) state.duration = 45;
    if (!state.remaining && state.remaining !== 0) state.remaining = state.duration;
    state.running = true;
    timerState[ei] = state;
    document.getElementById(`timerbtn-${ei}`).textContent = 'Pause';
    document.getElementById(`timer-${ei}`).classList.add('running');
    state.interval = setInterval(() => {
      state.remaining--;
      const display = document.getElementById(`timer-${ei}`);
      if (!display) { clearInterval(state.interval); return; }
      if (state.remaining <= 0) {
        clearInterval(state.interval);
        state.running = false;
        state.remaining = state.duration;
        display.textContent = 'GO!';
        display.classList.remove('running');
        document.getElementById(`timerbtn-${ei}`).textContent = 'Start';
        setTimeout(() => { if (display) display.textContent = formatTime(state.duration); }, 1500);
        try { if (window.navigator && navigator.vibrate) navigator.vibrate([200,100,200]); } catch(e) {}
      } else {
        display.textContent = formatTime(state.remaining);
      }
    }, 1000);
  }
}

function resetTimer(ei) {
  const state = timerState[ei] || {};
  if (state.interval) clearInterval(state.interval);
  state.running = false;
  const dur = state.duration || 45;
  state.remaining = dur;
  timerState[ei] = state;
  const display = document.getElementById(`timer-${ei}`);
  const btn = document.getElementById(`timerbtn-${ei}`);
  if (display) { display.textContent = formatTime(dur); display.classList.remove('running'); }
  if (btn) btn.textContent = 'Start';
}

function renderTournamentView(main) {
  main.innerHTML = `
    <div class="tournament-view">
      <div class="tournament-banner">
        <div class="t-label">Weekend</div>
        <div class="t-title">TOURNAMENT</div>
      </div>
      <div class="matchday-section">
        <div class="matchday-heading">Match Day Protocol</div>
        ${MATCHDAY.map(m => `
          <div class="matchday-card">
            <div class="matchday-card-title">${m.title}</div>
            <div class="matchday-card-desc">${m.desc}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

renderDayScroll();
renderContent();

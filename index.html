  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #f0f0f0; --muted: #666;
    --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.1);
    --red: #ff5555;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;

  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; max-width: 430px; margin: 0 auto; padding-bottom: 48px; }

  .header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }

  .app-title { font-family: var(--font-display); font-size: 30px; letter-spacing: 2px; line-height: 1; }
  .week-badge { font-size: 10px; font-weight: 500; color: var(--accent); background: var(--accent-dim); padding: 4px 10px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; }
  .week-tabs { display: flex; gap: 8px; }
  .week-tab { flex: 1; padding: 8px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .week-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }

  /* DAY SCROLL */
  .day-scroll-wrap { padding: 14px 20px 0; overflow-x: auto; scrollbar-width: none; }
  .day-scroll-wrap::-webkit-scrollbar { display: none; }
  .day-scroll { display: flex; gap: 10px; min-width: max-content; padding-bottom: 14px; }
  .day-pill { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.2s; min-width: 62px; }
  .day-pill.active { background: var(--accent); border-color: var(--accent); }
  .day-pill .day-name { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .day-pill.active .day-name { color: #000; }
  .day-pill .day-label { font-family: var(--font-display); font-size: 14px; letter-spacing: 0.5px; color: var(--text); text-align: center; line-height: 1.1; }
  .day-pill.active .day-label { color: #000; }

  /* SESSION */
  .session-header { padding: 18px 20px 10px; }
  .session-type { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
  .session-title { font-family: var(--font-display); font-size: 26px; letter-spacing: 1px; line-height: 1; margin-bottom: 6px; }
  .session-meta { display: flex; gap: 14px; font-size: 12px; color: var(--muted); }

  /* PROGRESS */
  .session-progress { padding: 0 20px 14px; }
  .progress-bar-bg { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
  .progress-text { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* WARMUP */
  .warmup-banner { margin: 0 20px 14px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 10px; padding: 11px 13px; }
  .warmup-title { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
  .warmup-text { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* ANKLE NOTE */
  .ankle-note { margin: 0 20px 14px; background: rgba(255,85,85,0.07); border: 1px solid rgba(255,85,85,0.18); border-radius: 10px; padding: 9px 13px; font-size: 12px; color: #ff8888; line-height: 1.5; }

  /* CARDIO BLOCK */
  .cardio-block { margin: 0 20px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .cardio-title { font-size: 13px; font-weight: 500; color: var(--accent); margin-bottom: 6px; }
  .cardio-rounds { font-size: 22px; font-family: var(--font-display); letter-spacing: 1px; color: var(--text); margin-bottom: 4px; }
  .cardio-detail { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .cardio-note { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 8px; }
  .circuit-label { padding: 0 20px 8px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }

  /* EXERCISE LIST */
  .exercise-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

  /* EXERCISE CARD */
  .ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: opacity 0.3s; }
  .ex-card.done { opacity: 0.4; }
  .ex-card.done .ex-name { text-decoration: line-through; }
  .ex-card-header { display: flex; align-items: center; padding: 13px; gap: 11px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .ex-number { font-family: var(--font-display); font-size: 18px; color: var(--muted); min-width: 24px; line-height: 1; }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .ex-muscle { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ex-sets-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 11px; font-weight: 500; color: var(--text); white-space: nowrap; flex-shrink: 0; }
  .ex-done-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .ex-done-btn.checked { background: var(--accent); border-color: var(--accent); }
  .checkmark { display: none; font-size: 13px; color: #000; }
  .ex-done-btn.checked .checkmark { display: block; }

  /* EXPAND */
  .ex-expand { display: none; border-top: 1px solid var(--border); }
  .ex-expand.open { display: block; }

  /* GIF */
  .ex-gif-wrap { width: 100%; background: #0f0f0f; display: flex; align-items: center; justify-content: center; min-height: 180px; position: relative; overflow: hidden; }
  .ex-gif-wrap img { width: 100%; max-height: 220px; object-fit: contain; display: block; }
  .gif-loader { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .gif-spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .gif-loader-text { font-size: 11px; color: var(--muted); }
  .gif-error { display: none; flex-direction: column; align-items: center; gap: 10px; padding: 24px; text-align: center; }
  .gif-error.show { display: flex; }
  .gif-error-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .gif-yt-link { font-size: 12px; color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; padding: 6px 14px; text-decoration: none; }

  /* DETAILS */
  .ex-details { padding: 13px; }
  .detail-section { margin-bottom: 13px; }
  .detail-label { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .detail-text { font-size: 13px; color: var(--text); line-height: 1.6; }
  .form-cues { display: flex; flex-direction: column; gap: 5px; }
  .form-cue { display: flex; gap: 8px; font-size: 13px; color: var(--text); line-height: 1.5; }
  .form-cue::before { content: '—'; color: var(--accent); flex-shrink: 0; }

  /* TIMER */
  .rest-timer-wrap { padding: 10px 13px 13px; border-top: 1px solid var(--border); }
  .rest-timer-label { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .timer-row { display: flex; align-items: center; gap: 10px; }
  .timer-display { font-family: var(--font-display); font-size: 34px; letter-spacing: 2px; color: var(--accent); min-width: 76px; line-height: 1; }
  .timer-display.running { color: var(--text); }
  .timer-btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .timer-btn.start-btn { background: var(--accent); border-color: var(--accent); color: #000; }

  .timer-presets { display: flex; gap: 6px; margin-top: 8px; }
  .preset-btn { flex: 1; padding: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; cursor: pointer; font-family: var(--font-body); transition: all 0.15s; -webkit-tap-highlight-color: transparent; }

  .rest-icon { font-size: 44px; margin-bottom: 14px; }
  .rest-title { font-family: var(--font-display); font-size: 30px; letter-spacing: 2px; margin-bottom: 8px; }
  .rest-subtitle { font-size: 14px; color: var(--muted); line-height: 1.7; }

  .tournament-banner { background: var(--accent); border-radius: 14px; padding: 18px; margin-bottom: 18px; text-align: center; }
  .t-label { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: rgba(0,0,0,0.45); margin-bottom: 3px; }

  .matchday-heading { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .matchday-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 10px; padding: 13px; margin-bottom: 8px; }
  .matchday-card-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .matchday-card-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

const MATCHDAY = [
  { title: 'Pre-game warmup (before each match)', desc: '3 min light jog → Leg swings 10 each leg (forward + lateral) → High knees 20 sec → Heel flicks 20 sec → 4× short 10m accelerations building to full pace' },
  { title: 'Hydration — non-negotiable', desc: 'Night before: extra water. Morning: 500ml before leaving home. Between games: 300–400ml water + electrolytes (Gatorade, Glucon-D, or ORS sachets). Don\'t wait until thirsty — by then you\'re already behind.' },
  { title: 'Between games', desc: 'Sit, eat something light (banana, biscuits), drink. Stay warm — don\'t let legs stiffen. 5 min light jog before the next game. If back-to-back: prioritise hydration and 2 min light leg movement minimum.' },
  { title: 'When you feel slow mentally', desc: 'It\'s almost always dehydration. Drink water. Take a breath. You\'ve trained the explosive system. Trust it. Composure comes from breathing — slow it down between plays.' },
];

let currentWeek = 1;
let currentDayIndex = 0;
const timerState = {};

function setWeek(w) {
  currentWeek = w;
  currentDayIndex = 0;
  document.querySelectorAll('.week-tab').forEach((t,i) => t.classList.toggle('active', i+1===w));
  document.getElementById('week-badge').textContent = `Week ${w}`;
  renderDayScroll();
  renderContent();
}

function renderDayScroll() {
  const days = PLAN[currentWeek];
  document.getElementById('day-scroll').innerHTML = days.map((d,i) => `
    <div class="day-pill ${i===currentDayIndex?'active':''}" onclick="selectDay(${i})">
      <span class="day-name">${d.day}</span>
      <span class="day-label">${d.label.replace('\n','<br>')}</span>
    </div>`).join('');
}

function selectDay(i) {
  currentDayIndex = i;
  renderDayScroll();
  renderContent();
  window.scrollTo({top:0,behavior:'smooth'});
}

function getDoneKey(ei) { return `done-w${currentWeek}-d${currentDayIndex}-e${ei}`; }
function isDone(ei) { return localStorage.getItem(getDoneKey(ei)) === '1'; }

function renderContent() {
  const day = PLAN[currentWeek][currentDayIndex];
  const main = document.getElementById('main-content');

  if (day.isRest) {
    main.innerHTML = `<div class="rest-view"><div class="rest-icon">💤</div><div class="rest-title">REST DAY</div><div class="rest-subtitle">${day.restMessage}</div></div>`;
    return;
  }
  if (day.isTaper) {
    main.innerHTML = `<div class="rest-view"><div class="rest-icon">🧘</div><div class="rest-title">TAPER DAY</div><div class="rest-subtitle">${day.taperMessage}</div></div>`;
    return;
  }
  if (day.isTournament) {
    main.innerHTML = `<div class="tournament-view">
      <div class="tournament-banner"><div class="t-label">Weekend</div><div class="t-title">TOURNAMENT 🏆</div></div>
      <div class="matchday-heading">Match Day Protocol</div>
      ${MATCHDAY.map(m=>`<div class="matchday-card"><div class="matchday-card-title">${m.title}</div><div class="matchday-card-desc">${m.desc}</div></div>`).join('')}
    </div>`;
    return;
  }

  const exs = day.exercises;
  const total = exs.length;
  const doneCount = exs.filter((_,i)=>isDone(i)).length;
  const pct = total > 0 ? Math.round(doneCount/total*100) : 0;

  let html = `
    <div class="session-header">
      <div class="session-type">${day.type}</div>
      <div class="session-title">${day.title}</div>
      <div class="session-meta">${day.meta.map(m=>`<span>${m}</span>`).join('')}</div>
    </div>
    <div class="session-progress">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${doneCount}/${total} exercises done</div>
    </div>
    <div class="warmup-banner">
      <div class="warmup-title">Warmup First</div>
      <div class="warmup-text">${day.warmup}</div>
    </div>`;

  if (day.ankleNote) {
    html += `<div class="ankle-note">⚠ Right ankle has repeated ligament history. Extra care on single-leg work. Land softly on all jump movements. Never rush ankle exercises.</div>`;
  }

  if (day.isCardio && day.cardioBlock) {
    const cb = day.cardioBlock;
    html += `<div class="cardio-block">
      <div class="cardio-title">Treadmill Sprint Intervals</div>
      <div class="cardio-rounds">${cb.rounds} ROUNDS</div>
      <div class="cardio-detail"><strong style="color:var(--text)">${cb.work}</strong><br>${cb.rest}</div>
      <div class="cardio-note">${cb.note}</div>
    </div>
    <div class="circuit-label">Then — Circuit</div>`;
  }

  html += `<div class="exercise-list">`;
  exs.forEach((ex,ei) => { html += buildExCard(ex, ei, isDone(ei)); });
  html += `</div>`;
  main.innerHTML = html;
}

function buildExCard(ex, ei, done) {
  return `<div class="ex-card ${done?'done':''}" id="excard-${ei}">
    <div class="ex-card-header" onclick="toggleExpand(${ei})">
      <div class="ex-number">0${ei+1}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-muscle">${ex.muscle}</div>
      </div>
      <div class="ex-sets-badge">${ex.sets}</div>
      <button class="ex-done-btn ${done?'checked':''}" id="donebtn-${ei}" onclick="toggleDone(event,${ei})">
        <span class="checkmark">✓</span>
      </button>
    </div>
    <div class="ex-expand" id="expand-${ei}">
      <div class="ex-gif-wrap" id="gifwrap-${ei}">
        <div class="gif-loader" id="gifloader-${ei}">
          <div class="gif-spinner"></div>
          <div class="gif-loader-text">Loading GIF…</div>
        </div>
        <img id="gifimg-${ei}" src="" alt="${ex.name}" style="display:none"
          onload="gifLoaded(${ei})" onerror="gifFailed(${ei})">
        <div class="gif-error" id="giferr-${ei}">
          <div class="gif-error-text">GIF unavailable</div>
          <a class="gif-yt-link" href="https://www.youtube.com/results?search_query=how+to+${encodeURIComponent(ex.name)}+exercise+form" target="_blank">Search on YouTube ↗</a>
        </div>
      </div>
      <div class="ex-details">
        ${ex.note ? `<div class="detail-section"><div class="detail-label">Note</div><div class="detail-text">${ex.note}</div></div>` : ''}
        <div class="detail-section">
          <div class="detail-label">Form Cues</div>
          <div class="form-cues">${ex.cues.map(c=>`<div class="form-cue">${c}</div>`).join('')}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Breathing</div>
          <div class="detail-text">${ex.breathing}</div>
        </div>
        <div class="rest-timer-wrap">
          <div class="rest-timer-label">Rest Timer</div>
          <div class="timer-row">
            <div class="timer-display" id="timer-${ei}">0:45</div>
            <button class="timer-btn start-btn" id="tbtn-${ei}" onclick="handleTimer(${ei})">Start</button>
            <button class="timer-btn" onclick="resetTimer(${ei})">Reset</button>
          </div>
          <div class="timer-presets">
            <button class="preset-btn selected" onclick="setPreset(${ei},45,this)">45s</button>
            <button class="preset-btn" onclick="setPreset(${ei},60,this)">60s</button>
            <button class="preset-btn" onclick="setPreset(${ei},90,this)">90s</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleExpand(ei) {
  const panel = document.getElementById(`expand-${ei}`);
  const isOpen = panel.classList.toggle('open');
  if (isOpen) loadGif(ei);
}

async function loadGif(ei) {
  const day = PLAN[currentWeek][currentDayIndex];
  const ex = day.exercises[ei];
  const img = document.getElementById(`gifimg-${ei}`);
  if (img.src && img.src !== window.location.href) return;
  const url = await fetchGif(ex.name);
  if (url) {
    img.src = url;
  } else {
    gifFailed(ei);
  }
}

function gifLoaded(ei) {
  document.getElementById(`gifloader-${ei}`).style.display = 'none';
  document.getElementById(`gifimg-${ei}`).style.display = 'block';
}

function gifFailed(ei) {
  document.getElementById(`gifloader-${ei}`).style.display = 'none';
  document.getElementById(`gifimg-${ei}`).style.display = 'none';
  document.getElementById(`giferr-${ei}`).classList.add('show');
}

function toggleDone(e, ei) {
  e.stopPropagation();
  const key = getDoneKey(ei);
  const val = localStorage.getItem(key) === '1';
  localStorage.setItem(key, val ? '0' : '1');
  document.getElementById(`excard-${ei}`).classList.toggle('done', !val);
  document.getElementById(`donebtn-${ei}`).classList.toggle('checked', !val);
  const day = PLAN[currentWeek][currentDayIndex];
  const total = day.exercises.length;
  const doneCount = day.exercises.filter((_,i)=>isDone(i)).length;
  const pct = Math.round(doneCount/total*100);
  const fill = document.querySelector('.progress-bar-fill');
  const text = document.querySelector('.progress-text');
  if (fill) fill.style.width = pct+'%';
  if (text) text.textContent = `${doneCount}/${total} exercises done`;
}

function formatTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function setPreset(ei, secs, btn) {
  resetTimer(ei);
  timerState[ei] = timerState[ei] || {};
  timerState[ei].duration = secs;
  timerState[ei].remaining = secs;
  document.getElementById(`timer-${ei}`).textContent = formatTime(secs);
  btn.closest('.timer-presets').querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function handleTimer(ei) {
  const s = timerState[ei] || {};
  if (!s.duration) s.duration = 45;
  if (s.remaining === undefined) s.remaining = s.duration;
  if (s.running) {
    clearInterval(s.interval);
    s.running = false;
    timerState[ei] = s;
    document.getElementById(`tbtn-${ei}`).textContent = 'Start';
    document.getElementById(`timer-${ei}`).classList.remove('running');
  } else {
    s.running = true;
    timerState[ei] = s;
    document.getElementById(`tbtn-${ei}`).textContent = 'Pause';
    document.getElementById(`timer-${ei}`).classList.add('running');
    s.interval = setInterval(() => {
      s.remaining--;
      const disp = document.getElementById(`timer-${ei}`);
      if (!disp) { clearInterval(s.interval); return; }
      if (s.remaining <= 0) {
        clearInterval(s.interval);
        s.running = false;
        s.remaining = s.duration;
        disp.textContent = 'GO!';
        disp.classList.remove('running');
        document.getElementById(`tbtn-${ei}`).textContent = 'Start';
        try { navigator.vibrate && navigator.vibrate([200,100,200]); } catch(e){}
        setTimeout(() => { if (disp) disp.textContent = formatTime(s.duration); }, 1500);
      } else {
        disp.textContent = formatTime(s.remaining);
      }
    }, 1000);
  }
}

function resetTimer(ei) {
  const s = timerState[ei] || {};
  if (s.interval) clearInterval(s.interval);
  s.running = false;
  const dur = s.duration || 45;
  s.remaining = dur;
  timerState[ei] = s;
  const disp = document.getElementById(`timer-${ei}`);
  const btn = document.getElementById(`tbtn-${ei}`);
  if (disp) { disp.textContent = formatTime(dur); disp.classList.remove('running'); }
  if (btn) btn.textContent = 'Start';
}

renderDayScroll();
renderContent();
</script>

</html>
